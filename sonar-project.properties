# Canonical SQL mirrors immutable migrations, and later migrations repeat full
# CREATE OR REPLACE bodies to preserve deployment history. Keep SQL issue and
# security analysis enabled, but do not treat migration history as duplicated
# application logic.
sonar.cpd.exclusions=**/supabase/schema.sql,**/supabase/migrations/0001_schema_core.sql,**/supabase/migrations/0002_fix_transfer_idempotency_request_hash.sql,**/supabase/migrations/0003_defer_transfer_delete_guard.sql,**/supabase/migrations/0004_fix_idempotency_rls_result_check.sql,**/supabase/migrations/0005_secure_ledger_bundle_rpc.sql,**/supabase/migrations/0006_precise_ledger_bundle_ownership_errors.sql,**/supabase/migrations/0007_resolve_ledger_account_names.sql,**/supabase/migrations/0008_create_missing_ledger_accounts.sql

# PostgreSQL enum labels and defaults intentionally repeat the canonical domain values.
sonar.issue.ignore.multicriteria=sqlSchemaLiterals,sqlMigrationLiterals
sonar.issue.ignore.multicriteria.sqlSchemaLiterals.ruleKey=plsql:S1192
sonar.issue.ignore.multicriteria.sqlSchemaLiterals.resourceKey=supabase/schema.sql
sonar.issue.ignore.multicriteria.sqlMigrationLiterals.ruleKey=plsql:S1192
